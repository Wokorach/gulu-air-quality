name: Fetch Real Gulu Air Quality Data

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests pytz
    
    - name: Fetch real Gulu air quality data
      run: python src/real_gulu_data.py
      continue-on-error: true
    
    - name: Generate static dashboard
      run: python src/generate_static.py
    
    - name: DEBUG - List all files
      run: |
        echo "=== Files in root ==="
        ls -la
        echo ""
        echo "=== Files in _site ==="
        ls -la _site/ || echo "No _site folder"
        echo ""
        echo "=== Check if index.html exists in root ==="
        if [ -f index.html ]; then
          echo "✅ index.html exists in root"
          head -5 index.html
        else
          echo "❌ index.html NOT found in root"
        fi
    
    - name: Copy site files to root
      run: |
        # Create _site if it doesn't exist
        mkdir -p _site
        
        # If generate_static.py creates index.html in root, move it
        if [ -f index.html ]; then
          cp index.html _site/
          echo "✅ Copied index.html from root to _site"
        fi
        
        # If generate_static.py creates index.html in _site, copy to root
        if [ -f _site/index.html ]; then
          cp _site/index.html ./
          echo "✅ Copied index.html from _site to root"
        else
          echo "⚠️ No index.html found anywhere"
        fi
        
        # List final files
        echo ""
        echo "=== Final files in root ==="
        ls -la *.html 2>/dev/null || echo "No HTML files in root"
        echo ""
        echo "=== Final files in _site ==="
        ls -la _site/ 2>/dev/null || echo "No _site folder"
    
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
