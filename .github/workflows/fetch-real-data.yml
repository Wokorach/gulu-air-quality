name: Fetch Real Gulu Air Quality Data

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  # Optional: Force Node.js 24 now to test
  # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests pandas pytz
    
    - name: Fetch real Gulu air quality data
      run: python src/real_gulu_data.py
    
    - name: Generate static dashboard
      run: python src/generate_static.py
    
    - name: Copy site to root (for GitHub Pages)
      run: |
        mkdir -p _site
        cp -r _site/* ./ || true
        echo "Site files ready"
    
    - name: List generated files (debug)
      run: |
        echo "Files in _site:"
        ls -la _site/ || echo "No _site folder yet"
        echo "Files in root:"
        ls -la *.html 2>/dev/null || echo "No HTML files in root"
    
    - name: Commit and push data
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add data/ _site/ *.html 2>/dev/null || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update real Gulu air quality data [$(date +'%Y-%m-%d %H:%M:%S')]" && git push)
    
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./_site
    
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
