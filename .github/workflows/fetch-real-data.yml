name: Fetch Real Gulu Air Quality Data

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests pandas pytz
    
    - name: Fetch real Gulu air quality data
      run: python src/real_gulu_data.py
    
    - name: Generate static dashboard
      run: python src/generate_static.py
    
    - name: Copy site files to root
      run: |
        if [ -f _site/index.html ]; then
          cp _site/index.html ./
          echo "✅ Copied index.html to root"
        else
          echo "⚠️ _site/index.html not found"
          ls -la _site/ || echo "No _site folder"
        fi
    
    - name: Commit and push changes
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add data/ _site/ *.html 2>/dev/null || true
        git status
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update real Gulu air quality data [$(date +'%Y-%m-%d %H:%M:%S')]" && git push)
    
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./
    
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
