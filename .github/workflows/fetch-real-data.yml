name: Fetch Real Gulu Air Quality Data

on:
  schedule:
    # Runs at minute 5 past every hour
    - cron: '5 * * * *'
  workflow_dispatch:
    # Allows manual triggering from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests pytz
    
    - name: Fetch real Gulu air quality data
      run: python src/real_gulu_data.py
      # This will use your AQICN token and fetch all 6 Gulu stations
    
    - name: Generate static dashboard
      run: python src/generate_static.py
      # This creates index.html from the fetched data
    
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
